# CodeTune v3 — QLoRA Fine-tuning Configuration
# Goal: BEAT base model HumanEval (84.8% pass@1)
# Changes from v2:
#   - 80% completion-style data (was 10%) — matches HumanEval's test format
#   - LoRA rank 64 / alpha 128 (was 32/64) — max adapter capacity
#   - learning_rate 1e-4 (was 2e-4) — gentler to reduce forgetting
#   - Sources: APPS + HumanEval + The Stack (not just CodeFeedback)

# Model
base_model: "Qwen/Qwen2.5-Coder-7B-Instruct"

# Quantization (QLoRA)
load_in_4bit: true
bnb_4bit_quant_type: "nf4"
bnb_4bit_compute_dtype: "float16"
bnb_4bit_use_double_quant: true

# LoRA — max capacity
lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
bias: "none"
task_type: "CAUSAL_LM"

# Training
num_train_epochs: 1
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
lr_scheduler_type: "cosine"
warmup_ratio: 0.05
max_seq_length: 1024
fp16: true
bf16: false
gradient_checkpointing: true
optim: "paged_adamw_32bit"

# Data
dataset_path: "data/processed_v3"
train_file: "train.jsonl"
eval_file: "eval.jsonl"

# Output
output_dir: "outputs/checkpoints_v3"
logging_steps: 10
save_strategy: "epoch"
eval_strategy: "epoch"
report_to: "none"

# Reproducibility
seed: 42
